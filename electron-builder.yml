appId: com.spine.texture-manager
productName: Spine Texture Manager
copyright: Copyright (C) 2026

# v1.1 Phase 10: ad-hoc macOS, unsigned NSIS, AppImage Linux.
# DIST-04: mac single-quoted dash identity locks ad-hoc signing (was implicit on Apple Silicon in v1.0).
# DIST-05: no Windows code-signing keys are present, so the NSIS installer is unsigned.
# No release-channel block — auto-update wiring is Phase 12 (UPD-01..UPD-06).

# Pitfall 1 belt-and-braces (Phase 11 live-verify finding): explicitly null the
# publisher so electron-builder skips its provider auto-detect at build-prep time.
# Without this, even with `--publish never` on the CLI, electron-builder
# auto-detects `provider: github` from the git remote and aborts with
# "GitHub Personal Access Token is not set" before the build finishes.
# Phase 12 will replace `null` with a real provider when auto-update lands.
publish: null

directories:
  output: release
  buildResources: build

# Whitelist: ship only the bundled output + package.json metadata.
# Explicitly EXCLUDE source, tests, fixtures, planning notes, scripts, and the
# user's Spine editor source files under temp/.
files:
  - out/**
  - package.json
  - "!src/**"
  - "!tsconfig*.json"
  - "!fixtures/**"
  - "!temp/**"
  - "!tests/**"
  - "!scripts/**"
  - "!.planning/**"
  - "!electron.vite.config.*"
  - "!vitest.config.*"
  - "!tailwind.config.*"
  - "!postcss.config.*"
  - "!*.md"
  - "!.gitignore"
  - "!.eslintrc*"
  - "!.prettierrc*"

asarUnpack:
  - resources/**
  - "**/node_modules/sharp/**/*"
  - "**/node_modules/@img/**/*"

# DIST-02, DIST-04: macOS arm64 .dmg, ad-hoc signed.
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: arm64
  identity: '-'
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

# DIST-01, DIST-05: Windows x64 NSIS, unsigned.
# Intentionally NO Windows code-signing keys ⇒ unsigned NSIS installer.
win:
  target:
    - target: nsis
      arch: x64
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${arch}.${ext}

# DIST-03: Linux x64 AppImage. Best-effort local build; CI is the canonical surface (Phase 11).
linux:
  target:
    - target: AppImage
      arch: x64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
