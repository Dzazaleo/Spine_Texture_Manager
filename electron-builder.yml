appId: com.spine.texture-manager
productName: Spine Texture Manager
copyright: Copyright (C) 2026

# v1.1 Phase 10: ad-hoc macOS, unsigned NSIS, AppImage Linux.
# DIST-04: mac single-quoted dash identity locks ad-hoc signing (was implicit on Apple Silicon in v1.0).
# DIST-05: no Windows code-signing keys are present, so the NSIS installer is unsigned.
# No release-channel block — auto-update wiring is Phase 12 (UPD-01..UPD-06).

# Phase 12.1 (Plan 12.1-01): revert Phase 12's `publish: github` block (it
# caused per-artifact upload race in CI — see 12.1-RESEARCH.md §Summary +
# §Pitfall 1 + deferred-items.md "CI tag-push will fail" entry).
# Static app-update.yml under build/ is bundled via extraResources to satisfy
# electron-updater's runtime requirement that the file exists in resources/
# (CITED: electron.build/auto-update + GH issues #8620 + #2667 + #4233).
# softprops/action-gh-release@v2.6.2 at release.yml:151 remains the SINGLE
# upload surface — uploads all 6 assets (3 installers + 3 latest*.yml) atomically.
publish: null

extraResources:
  - from: build/app-update.yml
    to: app-update.yml

directories:
  output: release
  buildResources: build

# Whitelist: ship only the bundled output + package.json metadata.
# Explicitly EXCLUDE source, tests, fixtures, planning notes, scripts, and the
# user's Spine editor source files under temp/.
files:
  - out/**
  - package.json
  - "!src/**"
  - "!tsconfig*.json"
  - "!fixtures/**"
  - "!temp/**"
  - "!tests/**"
  - "!scripts/**"
  - "!.planning/**"
  - "!electron.vite.config.*"
  - "!vitest.config.*"
  - "!tailwind.config.*"
  - "!postcss.config.*"
  - "!*.md"
  - "!.gitignore"
  - "!.eslintrc*"
  - "!.prettierrc*"

asarUnpack:
  - resources/**
  - "**/node_modules/sharp/**/*"
  - "**/node_modules/@img/**/*"

# DIST-02, DIST-04: macOS arm64 .dmg, ad-hoc signed.
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: arm64
  identity: '-'
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

# DIST-01, DIST-05: Windows x64 NSIS, unsigned.
# Intentionally NO Windows code-signing keys ⇒ unsigned NSIS installer.
win:
  target:
    - target: nsis
      arch: x64
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${arch}.${ext}

# DIST-03: Linux x64 AppImage. Best-effort local build; CI is the canonical surface (Phase 11).
linux:
  target:
    - target: AppImage
      arch: x64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
